# .github/workflows/publish-data.yml
name: CI and Data Publishing

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'   # daily at midnight UTC

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  scrape-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Run Lint
        run: npm run lint

      - name: Build project
        run: npm run build

      - name: Run Scraper
        run: |
          rm -f scraper.db
          npm run scrape
          sqlite3 scraper.db "VACUUM;"
          mv scraper.db sovereign-states.db

      - name: Generate Data Documentation
        run: npm run generate-docs

      - name: Generate Data CSV
        run: npm run generate-csv

      # NEW: Run the multilingual snapshot tests!
      - name: Run Tests
        run: npm test

      # NEW: Upload the SQLite DB as an artifact if the scraper fails so you can debug it locally
      - name: Upload Database on Failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: scraper-db-failure
          path: scraper.db
          if-no-files-found: ignore

      - name: Check for data changes
        id: check_changes
        run: |
          # 1. Fetch all tags so we can find the last release
          git fetch --tags --force
          
          # 2. Get the latest data tag
          LATEST_TAG=$(git describe --tags --abbrev=0 --match "data-*" 2>/dev/null || echo "")
          echo "last_tag=$LATEST_TAG" >> $GITHUB_OUTPUT
          
          # 3. Pull previous data from the data branch to compare
          git fetch origin data:data || echo "Data branch not found."
          
          if git show data:sovereign-states.json > countries_old_raw.json 2>/dev/null; then
            jq -S . countries_old_raw.json > countries_old.json
          else
            echo "No previous data found on branch."
          fi

          # 4. Normalize new data for comparison
          jq -S . data/sovereign-states.json > data/countries_normalized.json

          # 5. Compare
          if [ -f countries_old.json ]; then
            if git diff --no-index --exit-code countries_old.json data/countries_normalized.json > /dev/null; then
              echo "data_changed=false" >> $GITHUB_OUTPUT
              echo "data_updated=false" >> $GITHUB_OUTPUT
              echo "Data is identical. Skipping release."
            else
              echo "data_changed=true" >> $GITHUB_OUTPUT
              echo "data_updated=true" >> $GITHUB_OUTPUT
              echo "Changes detected."
            fi
          else
            # If no old file exists, it's definitely a change
            echo "data_changed=true" >> $GITHUB_OUTPUT
            echo "data_updated=true" >> $GITHUB_OUTPUT
          fi

      - name: Create data-status artifact
        if: github.event_name != 'pull_request'
        run: echo "${{ steps.check_changes.outputs.data_updated }}" > data_updated.txt

      - name: Upload data-status artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: data-status
          path: data_updated.txt

      - name: Ensure .nojekyll
        if: github.event_name != 'pull_request' && steps.check_changes.outputs.data_changed == 'true'
        run: touch data/.nojekyll

      - name: Setup GitHub Pages
        if: github.event_name != 'pull_request' && steps.check_changes.outputs.data_changed == 'true'
        uses: actions/configure-pages@v5

      - name: Upload artifact for GitHub Pages
        if: github.event_name != 'pull_request' && steps.check_changes.outputs.data_changed == 'true'
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'data'

      - name: Deploy to GitHub Pages
        if: github.event_name != 'pull_request' && steps.check_changes.outputs.data_changed == 'true'
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Generate dates and release info
        if: github.event_name != 'pull_request' && steps.check_changes.outputs.data_changed == 'true'
        id: date
        run: |
          TODAY=$(date +'%Y-%m-%d')
          TAG_DATE=$(date +'%Y.%m.%d-%H%M')
          echo "today=$TODAY" >> $GITHUB_OUTPUT
          echo "tag_date=$TAG_DATE" >> $GITHUB_OUTPUT

      - name: Determine release name
        if: github.event_name != 'pull_request' && steps.check_changes.outputs.data_changed == 'true'
        id: release_name
        run: |
          if [[ "${{ github.event_name }}" == "push" ]]; then
            echo "name=Automated Data Update" >> $GITHUB_OUTPUT
          else
            echo "name=Data Snapshot: ${{ steps.date.outputs.today }}" >> $GITHUB_OUTPUT
          fi

      - name: Update data branch
        id: update_data
        if: github.event_name != 'pull_request' && steps.check_changes.outputs.data_changed == 'true'
        run: |
          mkdir data-update
          cd data-update
          git init
          git config user.email "action@github.com"
          git config user.name "GitHub Action"
          git remote add origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git

          if git fetch origin data --depth=1; then
            git checkout data
          else
            git checkout --orphan data
            git rm -rf . || true
          fi

          cp ../data/sovereign-states.json .
          cp ../data/sovereign-states.min.json .
          cp ../data/schema.json .
          cp ../data/DATA_MODEL.md .
          cp ../data/sovereign-states.csv .

          git add sovereign-states.json sovereign-states.min.json schema.json DATA_MODEL.md sovereign-states.csv
          git commit -m "Data update: $(date -u)" || exit 0
          git push origin data
          echo "new_sha=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        if: github.event_name != 'pull_request' && steps.check_changes.outputs.data_changed == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: data-${{ steps.date.outputs.tag_date }}
          target_commitish: ${{ steps.update_data.outputs.new_sha }}
          name: ${{ steps.release_name.outputs.name }}
          files: |
            data/sovereign-states.json
            data/sovereign-states.min.json
            data/schema.json
            data/DATA_MODEL.md
            data/sovereign-states.csv
            sovereign-states.db
          body: |
            ### 🌍 Multilingual Data Snapshot
            
            Automated geographical data snapshot extracted from Wikipedia (EN, PT, FR, IT, ES).
            
            #### 🔍 Data Changes
            ${{ steps.check_changes.outputs.last_tag != '' && format('[View comparison with previous version ({0})](https://github.com/{1}/compare/{0}...data-{2})', steps.check_changes.outputs.last_tag, github.repository, steps.date.outputs.tag_date) || '🆕 _Initial data release_' }}
            
            #### 🗄️ Formats
            - **JSON:** Ideal for web apps.
            - **SQLite:** `sovereign-states.db` for SQL queries.
            - **CSV:** `sovereign-states.csv` for Excel/Data Science.
            
            #### 📜 Documentation
            - [Schema JSON](https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/schema.json)
            - [Data Model Docs](https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/DATA_MODEL.md)

            ---
            *Generated on ${{ steps.date.outputs.today }}*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
