name: Upstream Wikipedia Watcher

on:
  schedule:
    # Run at 2:00 AM every Wednesday and Sunday
    - cron: '0 2 * * 3,0'
  workflow_dispatch: # Allows manual triggering

jobs:
  monitor-wikipedia:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        
    - name: Install dependencies
      run: npm install

    - name: Run Live Watcher
      run: npm run canary
      
    - name: Alert on Failure
      if: failure()
      run: echo "::error::Wikipedia's HTML structure has likely changed! Please investigate."
