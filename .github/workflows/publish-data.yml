# .github/workflows/publish-data.yml
name: CI and Data Publishing

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'   # daily at midnight UTC

permissions:
  contents: write      # Required to create releases + tags
  pages: write         # Already needed for GitHub Pages deployment
  id-token: write      # Already needed for Pages

jobs:
  scrape-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build and Verify
        run: mvn clean verify

      - name: Run Scraper
        run: mvn exec:java -Dexec.mainClass="com.countryinfoscraper.WebScraper"

      - name: Install JSON Schema Validator
        run: npm install -g ajv-cli

      - name: Validate Data Quality
        run: |
          # This ensures the scraped data matches your strict schema requirements
          ajv validate -s src/main/resources/country-schema.json -d src/main/resources/countries.json --strict=false
          echo "Data validation passed. Proceeding to deployment."

      - name: Check for data changes
        id: check_changes
        run: |
          if git diff --exit-code src/main/resources/countries.json > /dev/null; then
            echo "data_changed=false" >> $GITHUB_OUTPUT
            echo "No data changes detected."
          else
            echo "data_changed=true" >> $GITHUB_OUTPUT
            echo "Data changes detected!"
            git diff --stat src/main/resources/countries.json
            git diff src/main/resources/countries.json
          fi

      # Optional: Add .nojekyll so GitHub Pages doesn't ignore underscore-prefixed files
      - name: Ensure .nojekyll
        if: github.event_name != 'pull_request' && steps.check_changes.outputs.data_changed == 'true'
        run: touch src/main/resources/.nojekyll

      - name: Setup GitHub Pages
        if: github.event_name != 'pull_request' && steps.check_changes.outputs.data_changed == 'true'
        uses: actions/configure-pages@v5

      - name: Upload artifact for GitHub Pages
        if: github.event_name != 'pull_request' && steps.check_changes.outputs.data_changed == 'true'
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'src/main/resources'   # contains countries.json, countries.min.json, .nojekyll

      - name: Deploy to GitHub Pages
        if: github.event_name != 'pull_request' && steps.check_changes.outputs.data_changed == 'true'
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Generate dates and release info
        if: github.event_name != 'pull_request' && steps.check_changes.outputs.data_changed == 'true'
        id: date
        run: |
          TODAY=$(date +'%Y-%m-%d')
          TAG_DATE=$(date +'%Y.%m.%d-%H%M')
          echo "today=$TODAY" >> $GITHUB_OUTPUT
          echo "tag_date=$TAG_DATE" >> $GITHUB_OUTPUT

      - name: Determine release name
        if: github.event_name != 'pull_request' && steps.check_changes.outputs.data_changed == 'true'
        id: release_name
        run: |
          if [[ "${{ github.event_name }}" == "push" ]]; then
            echo "name=Automated Data Update" >> $GITHUB_OUTPUT
          else
            echo "name=Data Snapshot: ${{ steps.date.outputs.today }}" >> $GITHUB_OUTPUT
          fi

      - name: Create GitHub Release
        if: github.event_name != 'pull_request' && steps.check_changes.outputs.data_changed == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: data-${{ steps.date.outputs.tag_date }}
          name: ${{ steps.release_name.outputs.name }}
          files: |
            src/main/resources/countries.json
            src/main/resources/countries.min.json
          body: |
            Automated data snapshot generated from Wikipedia.

            **Live URLs (always up-to-date):**
            - Full JSON → https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/countries.json
            - Minified JSON → https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/countries.min.json

            This release was triggered by: **${{ github.event_name }}**
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}