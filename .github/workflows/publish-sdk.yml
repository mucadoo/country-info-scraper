name: Publish SDK

on:
  workflow_run:
    workflows: ["CI and Data Publishing"]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

jobs:
  check-requirements:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    outputs:
      should_publish: ${{ steps.decide.outputs.should_publish }}
    steps:
      - name: Decide for Manual Dispatch
        if: github.event_name == 'workflow_dispatch'
        run: echo "should_publish=true" >> $GITHUB_OUTPUT
        id: manual

      - name: Download data-status artifact
        if: github.event_name == 'workflow_run'
        uses: actions/download-artifact@v4
        with:
          name: data-status
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ github.event.workflow_run.id }}

      - name: Read Status from Artifact
        if: github.event_name == 'workflow_run'
        id: run_check
        run: |
          STATUS=$(cat data_updated.txt | xargs)
          echo "data_updated=$STATUS" >> $GITHUB_OUTPUT

      - name: Final Decision
        id: decide
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "should_publish=true" >> $GITHUB_OUTPUT
          else
            echo "should_publish=${{ steps.run_check.outputs.data_updated }}" >> $GITHUB_OUTPUT
          fi

  publish:
    needs: check-requirements
    if: needs.check-requirements.outputs.should_publish == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 

      - name: Fetch Data from Data Branch
        run: |
          git fetch origin data
          # 1. Checkout files from the ROOT of the data branch
          git checkout origin/data -- sovereign-states.json sovereign-states.min.json schema.json DATA_MODEL.md sovereign-states.csv
          
          # 2. Create the data directory
          mkdir -p data
          
          # 3. Move the files into the directory where the SDK expects them
          mv sovereign-states.json data/sovereign-states.json
          mv sovereign-states.min.json data/sovereign-states.min.json
          mv schema.json data/schema.json
          mv DATA_MODEL.md data/DATA_MODEL.md
          mv sovereign-states.csv data/sovereign-states.csv

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org/'

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Install dependencies
        run: npm install

      - name: Build SDK
        run: npm run build:sdk

      - name: Version Patch
        run: |
          npm version patch -m "chore: release v%s [skip ci]"

      - name: Publish to NPM
        run: |
          npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Push Version Change
        run: |
          git push --follow-tags
