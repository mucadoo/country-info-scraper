name: Upstream Wikipedia Watcher

on:
  schedule:
    # Run at 2:00 AM every Wednesday and Sunday
    - cron: '0 2 * * 3,0'
  workflow_dispatch: # Allows manual triggering

jobs:
  monitor-wikipedia:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven
        
    - name: Run Live Watcher Tests
      # Force Maven to ONLY run the live-watcher tests
      run: mvn -B test -Dgroups="live-watcher"
      
    - name: Alert on Failure
      if: failure()
      run: echo "::error::Wikipedia's HTML structure has likely changed! Please investigate."
