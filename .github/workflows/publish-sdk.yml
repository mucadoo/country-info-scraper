name: Publish SDK

on:
  workflow_run:
    workflows: ["CI and Data Publishing"]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

jobs:
  check-requirements:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    outputs:
      should_publish: ${{ steps.decide.outputs.should_publish }}
    steps:
      - name: Decide for Manual Dispatch
        if: github.event_name == 'workflow_dispatch'
        run: echo "should_publish=true" >> $GITHUB_OUTPUT
        id: manual

      - name: Download data-status artifact
        if: github.event_name == 'workflow_run'
        uses: actions/download-artifact@v4
        with:
          name: data-status
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ github.event.workflow_run.id }}

      - name: Read Status from Artifact
        if: github.event_name == 'workflow_run'
        id: run_check
        run: |
          STATUS=$(cat data_updated.txt | xargs)
          echo "data_updated=$STATUS" >> $GITHUB_OUTPUT

      - name: Final Decision
        id: decide
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "should_publish=true" >> $GITHUB_OUTPUT
          else
            echo "should_publish=${{ steps.run_check.outputs.data_updated }}" >> $GITHUB_OUTPUT
          fi

  publish:
    needs: check-requirements
    if: needs.check-requirements.outputs.should_publish == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 

      - name: Fetch Data from Data Branch
        run: |
          git fetch origin data
          mkdir -p data
          
          # Use 'git show' to get the file content without affecting the git index
          FILES=("sovereign-states.json" "sovereign-states.min.json" "schema.json" "DATA_MODEL.md" "sovereign-states.csv")
          
          for file in "${FILES[@]}"; do
            echo "Extracting $file from data branch..."
            git show origin/data:"$file" > "data/$file" || echo "Warning: $file not found"
          done

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org/'

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Install dependencies
        run: npm install

      - name: Build SDK
        run: npm run build:sdk

      - name: Version Patch
        run: |
          # The --force flag ensures npm proceeds even if there are 
          # local-only files (like our fetched data)
          npm version patch -m "chore: release v%s [skip ci]" --force

      - name: Publish to NPM
        run: |
          npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Push Version Change
        run: |
          git push --follow-tags
