# .github/workflows/publish-data.yml
name: CI and Data Publishing

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'   # daily at midnight UTC

permissions:
  contents: write      # Required to create releases + tags
  pages: write         # Already needed for GitHub Pages deployment
  id-token: write      # Already needed for Pages

jobs:
  scrape-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build project
        run: npm run build

      - name: Run Scraper
        run: npm run scrape

      - name: Check for data changes
        id: check_changes
        run: |
          # Fetch the data branch to compare against
          git fetch origin data:data || echo "Data branch not found."
          
          if git show data:countries.json > countries_old.json 2>/dev/null; then
            echo "Found previous data."
          fi

          if [ -f countries_old.json ]; then
            if git diff --no-index --exit-code countries_old.json data/countries.json > /dev/null; then
              echo "data_changed=false" >> $GITHUB_OUTPUT
            else
              echo "data_changed=true" >> $GITHUB_OUTPUT
              git diff --no-index --stat countries_old.json data/countries.json || true
            fi
          else
            echo "data_changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Ensure .nojekyll
        if: github.event_name != 'pull_request' && steps.check_changes.outputs.data_changed == 'true'
        run: touch data/.nojekyll

      - name: Setup GitHub Pages
        if: github.event_name != 'pull_request' && steps.check_changes.outputs.data_changed == 'true'
        uses: actions/configure-pages@v5

      - name: Upload artifact for GitHub Pages
        if: github.event_name != 'pull_request' && steps.check_changes.outputs.data_changed == 'true'
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'data'

      - name: Deploy to GitHub Pages
        if: github.event_name != 'pull_request' && steps.check_changes.outputs.data_changed == 'true'
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Generate dates and release info
        if: github.event_name != 'pull_request' && steps.check_changes.outputs.data_changed == 'true'
        id: date
        run: |
          TODAY=$(date +'%Y-%m-%d')
          TAG_DATE=$(date +'%Y.%m.%d-%H%M')
          echo "today=$TODAY" >> $GITHUB_OUTPUT
          echo "tag_date=$TAG_DATE" >> $GITHUB_OUTPUT

      - name: Determine release name
        if: github.event_name != 'pull_request' && steps.check_changes.outputs.data_changed == 'true'
        id: release_name
        run: |
          if [[ "${{ github.event_name }}" == "push" ]]; then
            echo "name=Automated Data Update" >> $GITHUB_OUTPUT
          else
            echo "name=Data Snapshot: ${{ steps.date.outputs.today }}" >> $GITHUB_OUTPUT
          fi

      - name: Update data branch
        id: update_data
        if: github.event_name != 'pull_request' && steps.check_changes.outputs.data_changed == 'true'
        run: |
          mkdir data-update
          cd data-update
          git init
          git config user.email "action@github.com"
          git config user.name "GitHub Action"
          git remote add origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git

          if git fetch origin data --depth=1; then
            git checkout data
          else
            git checkout --orphan data
            git rm -rf . || true
          fi

          cp ../data/countries.json .
          cp ../data/countries.min.json .

          git add countries.json countries.min.json
          git commit -m "Data update: $(date -u)" || exit 0
          git push origin data
          echo "new_sha=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        if: github.event_name != 'pull_request' && steps.check_changes.outputs.data_changed == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: data-${{ steps.date.outputs.tag_date }}
          target_commitish: ${{ steps.update_data.outputs.new_sha }}
          name: ${{ steps.release_name.outputs.name }}
          files: |
            data/countries.json
            data/countries.min.json
          body: |
            Automated data snapshot generated from Wikipedia.

            **Changes:**
            ${{ steps.check_changes.outputs.last_tag != '' && format('- [View JSON Diff](https://github.com/{0}/compare/{1}...data-{2})', github.repository, steps.check_changes.outputs.last_tag, steps.date.outputs.tag_date) || '- _First data release_' }}

            **Live URLs (always up-to-date):**
            - Full JSON → https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/countries.json
            - Minified JSON → https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/countries.min.json

            Triggered by: **${{ github.event_name }}**
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}