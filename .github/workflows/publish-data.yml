name: Publish Scraped Data

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'

jobs:
  scrape-and-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0 # Required for tagging

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven

    - name: Build and Run Scraper
      run: |
        mvn clean install -DskipTests
        mvn exec:java -Dexec.mainClass="com.countryinfoscraper.WebScraper"

    - name: 1. Deploy to Data Branch (Live API)
      uses: s0/git-publish-subdir-action@develop
      env:
        REPO: self
        BRANCH: data
        FOLDER: src/main/resources
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        MESSAGE: "Data Update: ${{ github.run_number }}"

    - name: 2. Generate Release Tag
      id: tag_gen
      run: |
        TAG_NAME="data-$(date +'%Y.%m.%d-%H%M')"
        echo "TAG=$TAG_NAME" >> $GITHUB_OUTPUT

    - name: 3. Create GitHub Release (Archive)
      uses: softprops/action-gh-release@v1
      with:
        tag_name: ${{ steps.tag_gen.outputs.TAG }}
        name: "Data Snapshot: $(date +'%Y-%m-%d')"
        files: |
          src/main/resources/countries.json
          src/main/resources/countries.min.json
        body: |
          Automated data snapshot generated from Wikipedia.
          
          **Live URL (Latest):** https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/countries.json
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
