name: Java CI

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven
    # Because of our pom.xml update, this runs Tiers 1, 2, and 3, but skips the Live Watcher!
    # It runs in seconds and is 100% reliable.
    - name: Build and Test
      run: mvn -B verify
