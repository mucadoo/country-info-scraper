name: Publish SDK

on:
  # This triggers after your main scraper finishes successfully
  workflow_run:
    workflows: ["CI and Data Publishing"]
    types: [completed]
  workflow_dispatch: # Allows you to run it manually for the first time

jobs:
  publish:
    runs-on: ubuntu-latest
    # Only run if the scraper succeeded OR if you triggered it manually
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org/'

      - name: Install dependencies
        run: npm install

      - name: Build SDK
        run: npm run build:sdk

      - name: Publish to NPM
        # We use the token here. Note: no 'if' check needed on the secret itself here
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}