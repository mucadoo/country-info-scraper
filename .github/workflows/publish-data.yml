# .github/workflows/publish-data.yml
name: CI and Data Publishing

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'   # daily at midnight UTC

permissions:
  contents: write      # Required to create releases + tags
  pages: write         # Already needed for GitHub Pages deployment
  id-token: write      # Already needed for Pages

jobs:
  scrape-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build and Verify
        run: mvn clean verify

      - name: Run Scraper
        run: mvn exec:java -Dexec.mainClass="com.countryinfoscraper.WebScraper"

      - name: Install JSON Schema Validator
        run: npm install -g ajv-cli

      - name: Validate Data Quality
        run: |
          # This ensures the scraped data matches your strict schema requirements
          ajv validate -s src/main/resources/country-schema.json -d src/main/resources/countries.json --strict=false
          echo "Data validation passed. Proceeding to deployment."

      - name: Check for data changes
        id: check_changes
        run: |
          # Fetch the data branch to compare against
          # This is the industry standard 'Data Branch' pattern for scrapers
          git fetch origin data:data || echo "Data branch not found. This might be the first run."
          
          # Fetch tags to identify the last data release for comparison
          git fetch --tags origin || true

          if git show data:countries.json > countries_old.json 2>/dev/null; then
            echo "Found previous data on 'data' branch."
          else
            echo "No previous data found on 'data' branch."
          fi

          if [ -f countries_old.json ]; then
            if git diff --no-index --exit-code countries_old.json src/main/resources/countries.json > /dev/null; then
              echo "data_changed=false" >> $GITHUB_OUTPUT
              echo "No data changes detected compared to 'data' branch."
            else
              echo "data_changed=true" >> $GITHUB_OUTPUT
              echo "Data changes detected!"
              echo "Summary of changes:"
              git diff --no-index --stat countries_old.json src/main/resources/countries.json || true
            fi
          else
            echo "data_changed=true" >> $GITHUB_OUTPUT
            echo "No previous data found. Assuming data changed."
          fi

          # Find the last tag starting with 'data-' for comparison links
          LAST_TAG=$(git tag -l "data-*" --sort=-v:refname | head -n 1)
          echo "last_tag=$LAST_TAG" >> $GITHUB_OUTPUT
          echo "Previous data tag found: $LAST_TAG"

      # Optional: Add .nojekyll so GitHub Pages doesn't ignore underscore-prefixed files
      - name: Ensure .nojekyll
        if: github.event_name != 'pull_request' && steps.check_changes.outputs.data_changed == 'true'
        run: touch src/main/resources/.nojekyll

      - name: Setup GitHub Pages
        if: github.event_name != 'pull_request' && steps.check_changes.outputs.data_changed == 'true'
        uses: actions/configure-pages@v5

      - name: Upload artifact for GitHub Pages
        if: github.event_name != 'pull_request' && steps.check_changes.outputs.data_changed == 'true'
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'src/main/resources'   # contains countries.json, countries.min.json, .nojekyll

      - name: Deploy to GitHub Pages
        if: github.event_name != 'pull_request' && steps.check_changes.outputs.data_changed == 'true'
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Generate dates and release info
        if: github.event_name != 'pull_request' && steps.check_changes.outputs.data_changed == 'true'
        id: date
        run: |
          TODAY=$(date +'%Y-%m-%d')
          TAG_DATE=$(date +'%Y.%m.%d-%H%M')
          echo "today=$TODAY" >> $GITHUB_OUTPUT
          echo "tag_date=$TAG_DATE" >> $GITHUB_OUTPUT

      - name: Determine release name
        if: github.event_name != 'pull_request' && steps.check_changes.outputs.data_changed == 'true'
        id: release_name
        run: |
          if [[ "${{ github.event_name }}" == "push" ]]; then
            echo "name=Automated Data Update" >> $GITHUB_OUTPUT
          else
            echo "name=Data Snapshot: ${{ steps.date.outputs.today }}" >> $GITHUB_OUTPUT
          fi

      - name: Update data branch
        if: github.event_name != 'pull_request' && steps.check_changes.outputs.data_changed == 'true'
        run: |
          # Persist the data to the 'data' branch for future diffs
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"

          # Use a separate folder to avoid workspace side-effects
          mkdir data-update
          cd data-update
          git init
          git remote add origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git

          if git fetch origin data --depth=1; then
            git checkout data
          else
            git checkout --orphan data
            git rm -rf . || true
          fi

          # Copy files from parent workspace
          cp ../src/main/resources/countries.json .
          cp ../src/main/resources/countries.min.json .

          git add countries.json countries.min.json
          git commit -m "Data update: $(date -u)" || exit 0
          git push origin data

      - name: Create GitHub Release
        if: github.event_name != 'pull_request' && steps.check_changes.outputs.data_changed == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: data-${{ steps.date.outputs.tag_date }}
          target_commitish: data
          name: ${{ steps.release_name.outputs.name }}
          files: |
            src/main/resources/countries.json
            src/main/resources/countries.min.json
          body: |
            Automated data snapshot generated from Wikipedia.

            **Changes:**
            ${{ steps.check_changes.outputs.last_tag != '' && format('- [View JSON Diff](https://github.com/{0}/compare/{1}...data-{2})', github.repository, steps.check_changes.outputs.last_tag, steps.date.outputs.tag_date) || '- _First data release_' }}

            **Live URLs (always up-to-date):**
            - Full JSON → https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/countries.json
            - Minified JSON → https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/countries.min.json

            **Source Context:**
            - Scraper Code: [${{ github.sha }}](https://github.com/${{ github.repository }}/commit/${{ github.sha }})
            - Triggered by: **${{ github.event_name }}**
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}