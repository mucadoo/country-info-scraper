# .github/workflows/publish-data.yml
name: Publish Scraped Data to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'   # daily at midnight UTC

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  scrape-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build project
        run: mvn clean install -DskipTests

      - name: Run Scraper
        run: mvn exec:java -Dexec.mainClass="com.countryinfoscraper.WebScraper"

      # Optional: Add .nojekyll so GitHub Pages doesn't ignore underscore-prefixed files
      - name: Ensure .nojekyll
        run: touch src/main/resources/.nojekyll

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact for GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'src/main/resources'   # contains countries.json, countries.min.json, .nojekyll

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Generate date for tag and release name
        id: date
        run: |
          echo "tag=$(date +'%Y.%m.%d-%H%M')" >> $GITHUB_OUTPUT
          echo "name=$(date +'%Y-%m-%d')" >> $GITHUB_OUTPUT

      - name: Create GitHub Release (Archive + Human-friendly)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: data-${{ steps.date.outputs.tag }}
          name: "Data Snapshot: ${{ steps.date.outputs.name }}"
          files: |
            src/main/resources/countries.json
            src/main/resources/countries.min.json
          body: |
            Automated data snapshot generated from Wikipedia.

            **Live URLs (always up-to-date):**
            - Full: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/countries.json
            - Minified: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/countries.min.json
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}